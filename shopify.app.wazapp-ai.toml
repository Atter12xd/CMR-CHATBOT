# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "2a36a40cd7d71108680b16846b201d1f"
name = "wazapp ai"
# Vista para comerciantes (no la landing de marketing). Tras deploy: Partners toma este valor al publicar con CLI.
application_url = "https://wazapp.ai/app/shopify"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_orders,read_products,write_customers,write_orders,write_products"

[auth]
redirect_urls = [ "https://wazapp.ai/api/shopify/callback" ]
