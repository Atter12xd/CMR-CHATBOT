<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wazapp chat</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        height: 100%;
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        function toParent(o) {
          try {
            if (window.parent !== window) {
              window.parent.postMessage(
                Object.assign({ type: 'wazapp-embed', v: 1, source: 'wazapp-iframe-page' }, o || {}),
                '*',
              );
            }
          } catch (e) {}
        }
        toParent({ phase: 'iframe-html-started', iframeOrigin: location.origin });
        console.info('[Wazapp iframe] Página de embed. Origen:', location.origin);
        console.info(
          '[Wazapp iframe] Si miras la consola de la web del cliente: pega el listener del panel Wazapp o el script wazapp-embed-console-bridge.js',
        );
        var q = (new URLSearchParams(location.search).get('siteKey') || '').trim().toLowerCase();
        if (!q || q.length !== 64 || !/^[0-9a-f]+$/.test(q)) {
          console.warn(
            '[Wazapp iframe] ?siteKey= inválido o falta. Debe ser 64 caracteres hex. URL actual:',
            location.href,
          );
          toParent({ phase: 'iframe-sitekey-invalid', href: location.href });
          document.body.innerHTML =
            '<p style="font:12px system-ui,sans-serif;padding:10px;color:#64748b">siteKey inválido (64 hex).</p>';
          return;
        }
        toParent({ phase: 'iframe-sitekey-ok', keyPreview: q.slice(0, 8) + '…' });
        console.info('[Wazapp iframe] Clave OK (64 hex, vista ' + q.slice(0, 8) + '…). Cargando widget.js…');
        var base = location.origin.replace(/\/+$/, '');
        var s = document.createElement('script');
        s.src = base + '/widget.js?siteKey=' + encodeURIComponent(q);
        s.defer = true;
        s.setAttribute('data-debug', 'true');
        s.onload = function () {
          toParent({ phase: 'iframe-widgetjs-loaded' });
          console.info('[Wazapp iframe] widget.js descargado (consola del iframe = marco del embed).');
        };
        s.onerror = function () {
          toParent({ phase: 'iframe-widgetjs-blocked', src: s.src });
          console.error(
            '[Wazapp iframe] No se pudo cargar',
            s.src,
            '— bloqueador, CSP, red o URL incorrecta. En la web padre: permite script/frame a este host.',
          );
        };
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
